version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: incident_password
      POSTGRES_DB: incident_response
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6-alpine
    environment:
      MONGO_INITDB_ROOT_USERNAME: incident_user
      MONGO_INITDB_ROOT_PASSWORD: incident_password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build: .
    environment:
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_response
      MONGODB_URI: mongodb://incident_user:incident_password@mongodb:27017/incident_db
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      RUN_DEMO: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./knowledge_base:/app/knowledge_base
    networks:
      - incident_network

volumes:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  incident_network:
    driver: bridge
